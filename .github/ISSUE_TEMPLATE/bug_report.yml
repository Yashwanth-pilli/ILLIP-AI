name: Bug report
description: Report a reproducible problem in ILLIP
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue. Please provide enough detail for us to reproduce it.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps so we can reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share relevant environment details.
      placeholder: |
        - OS:
        - Browser/App version:
        - Python version:
        - Model provider:
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add logs, screenshots, or any other helpful context.
